name: Deploy Preview (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/folder-upload-preview-url-5tzplm
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue3-app/package-lock.json

      - name: Build Vue app
        working-directory: vue3-app
        run: |
          npm ci
          npx vite build --base=/cms_v3/

      - name: Assemble site (Vue app at /, prototype at /prototype/)
        run: |
          mkdir -p _site/prototype
          cp -r vue3-app/dist/. _site/
          cp index.html standalone.html styles.css data.jsx components.jsx account-pages.jsx tweaks-panel.jsx _site/prototype/
          cp -r assets _site/prototype/assets
          touch _site/.nojekyll

      - name: Push to gh-pages branch
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
