name: Deploy Preview (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/folder-upload-preview-url-5tzplm
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vue3-app/package-lock.json

      - name: Build Vue app
        working-directory: vue3-app
        run: |
          npm ci
          npx vite build --base=/cms_v3/

      - name: Assemble site (Vue app at /, prototype at /prototype/)
        run: |
          mkdir -p _site/prototype
          cp -r vue3-app/dist/. _site/
          cp index.html standalone.html styles.css data.jsx components.jsx account-pages.jsx tweaks-panel.jsx _site/prototype/
          cp -r assets _site/prototype/assets

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
