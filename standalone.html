<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>100% — Games Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 100% Games Lobby */
:root {
  --bg: #05080f;
  --bg-elev: #0a0f1a;
  --bg-card: #0f1623;
  --bg-card-hi: #161f30;
  --line: rgba(160,210,255,0.07);
  --line-hi: rgba(160,210,255,0.16);
  --text: #eaf5ff;
  --text-mid: rgba(234,245,255,0.7);
  --text-dim: rgba(234,245,255,0.42);
  --accent: #1fd373;
  --accent-2: #29e8a3;
  --accent-3: #b6f37c;
  --accent-ink: #04101a;
  --accent-shade: #000;
  --live: #ff3b3b;
  --pos: #1fd373;
  --neg: #ef4444;
  --pos: oklch(0.78 0.18 145);
  --neg: oklch(0.7 0.22 25);
  --accent-grad: linear-gradient(135deg,
    color-mix(in oklch, var(--accent) 100%, white 20%) 0%,
    var(--accent) 38%,
    color-mix(in oklch, var(--accent) 78%, #000) 100%);
  --accent-grad-soft: linear-gradient(135deg,
    color-mix(in oklch, var(--accent) 22%, transparent) 0%,
    color-mix(in oklch, var(--accent) 6%, transparent) 100%);
  --bg-grad-card: linear-gradient(180deg, var(--bg-card) 0%, color-mix(in oklch, var(--bg-card) 80%, #000) 100%);
  --accent-glow: 0 6px 26px color-mix(in oklch, var(--accent) 38%, transparent),
                 0 0 0 1px color-mix(in oklch, var(--accent) 50%, transparent) inset,
                 0 0 22px color-mix(in oklch, var(--accent) 28%, transparent) inset;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --card-pad: 14px;
  --rail-gap: 12px;
  --card-aspect: 0.74;
  --container: 1440px;
  --header-h: 64px;
  --shadow-card: 0 1px 0 rgba(255,255,255,.04) inset, 0 6px 18px rgba(0,0,0,.4);
  --shadow-glow: 0 0 0 1px var(--accent), 0 8px 28px color-mix(in oklch, var(--accent) 30%, transparent);
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

[data-theme="light"] {
  --bg: #f4f3ef;
  --bg-elev: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hi: #f7f6f1;
  --line: rgba(15,15,23,0.08);
  --line-hi: rgba(15,15,23,0.18);
  --text: #0f0f17;
  --text-mid: rgba(15,15,23,0.72);
  --text-dim: rgba(15,15,23,0.45);
  --shadow-card: 0 1px 0 rgba(255,255,255,.6) inset, 0 4px 14px rgba(15,15,23,.08);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 0% 0%, color-mix(in oklch, var(--accent) 10%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 100%, color-mix(in oklch, var(--accent) 7%, transparent) 0%, transparent 60%);
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body { overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* layout */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 28px;
}

/* app shell with sidebar */
.shell { display: flex; min-height: 100vh; }
.shell-main {
  flex: 1;
  min-width: 0;
  margin-left: 248px;
  transition: margin-left .25s;
}
.shell.collapsed .shell-main { margin-left: 64px; }

.sidebar-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.sidebar.collapsed .sidebar-tabs { display: none; }
.sb-tab {
  padding: 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, var(--bg-card) 0%, color-mix(in oklch, var(--bg-card) 80%, #000) 100%);
  color: var(--text-mid);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.sb-tab:hover:not(.active) { color: var(--text); border-color: var(--line-hi); }

/* sidebar tier progress */
.sb-tier {
  padding: 12px 16px 14px;
  border-bottom: 1px solid var(--line);
}
.sidebar.collapsed .sb-tier { display: none; }
.sb-tier-track {
  height: 6px;
  border-radius: 999px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  overflow: hidden;
  margin-bottom: 8px;
}
.sb-tier-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 10px var(--accent);
}
.sb-tier-meta {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  font-family: var(--font-mono);
}
.sb-tier-cur { color: var(--accent-2); display: inline-flex; align-items: center; gap: 4px; }
.sb-tier-num { color: var(--text); font-weight: 700; text-align: center; }
.sb-tier-next { color: #f59e0b; display: inline-flex; align-items: center; gap: 4px; text-align: right; }

/* sidebar mobile drawer (default desktop = invisible) */
.sidebar-backdrop { display: none; }

/* ── MOBILE BOTTOM NAV ──────────────────── */
.mobile-nav { display: none; }
@media (max-width: 900px) {
  .mobile-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 80;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    backdrop-filter: blur(14px);
  }
  .mnav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: transparent;
    border: 0;
    padding: 6px 4px;
    color: var(--text-mid);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }
  .mnav-btn.active { color: var(--accent-2); }
  .mnav-btn.active::after {
    content: '';
    position: absolute;
    top: 0; left: 22%; right: 22%;
    height: 2px;
    border-radius: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .mnav-icon { display: grid; place-items: center; }
  .mnav-label { letter-spacing: 0.02em; }
  body { padding-bottom: 64px; }
}

/* ── SIDEBAR ───────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 248px;
  background: var(--bg-elev);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  z-index: 70;
  transition: width .25s;
}
.sidebar.collapsed { width: 64px; }
.sidebar-brand {
  height: var(--header-h);
  display: flex; align-items: center; justify-content: flex-start;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
}
.topbar-brand {
  display: flex; align-items: center;
}
.topbar-logo {
  height: 32px;
  width: auto;
  display: block;
  filter: drop-shadow(0 0 12px color-mix(in oklch, var(--accent) 35%, transparent));
}

/* ── TOPBAR USER (after login) ─────────── */
.tb-balance {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
  border: 1px solid var(--line-hi);
  border-radius: 10px;
  padding: 6px 14px 6px 10px;
  font-family: var(--font-body);
}
.tb-coin {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  box-shadow: 0 0 8px rgba(250,204,21,.6);
  flex-shrink: 0;
}
.tb-balance-rows {
  display: flex; flex-direction: row;
  gap: 16px;
  align-items: baseline;
}
.tb-balance-row {
  display: flex; align-items: baseline;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
}
.tb-balance-label { color: var(--text-mid); }
.tb-balance-num {
  color: #facc15;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

.tb-user-wrap { position: relative; }
.tb-user-circle {
  position: relative;
  width: 44px; height: 44px;
  padding: 0;
  border-radius: 50%;
  border: 0;
  background: transparent;
  cursor: pointer;
  display: grid; place-items: center;
}
.tb-icon-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--line-hi);
  background: linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
  color: var(--text-mid);
  display: grid; place-items: center;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.tb-icon-btn:hover { color: var(--text); border-color: var(--accent); }
.tb-avatar {
  width: 30px; height: 30px;
  border-radius: 8px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 35%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  border: 1.5px solid var(--accent);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 8px var(--accent);
  box-shadow: 0 0 10px color-mix(in oklch, var(--accent) 40%, transparent);
  flex-shrink: 0;
}
.tb-avatar.circle {
  width: 38px; height: 38px;
  border-radius: 50%;
  border-width: 2px;
  font-size: 12px;
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 14px color-mix(in oklch, var(--accent) 45%, transparent);
}
.tb-tier-badge {
  position: absolute;
  bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 18px;
  display: grid; place-items: center;
  color: var(--accent);
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
  background: var(--bg);
  clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
}
.tb-avatar.lg {
  width: 44px; height: 44px;
  font-size: 14px;
  border-radius: 50%;
  border-width: 2px;
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 14px color-mix(in oklch, var(--accent) 45%, transparent);
}

.tb-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 260px;
  background: var(--bg-elev);
  border: 1px solid var(--line-hi);
  border-radius: 14px;
  padding: 6px;
  z-index: 60;
  box-shadow: 0 16px 40px rgba(0,0,0,.55), 0 0 0 1px color-mix(in oklch, var(--accent) 14%, transparent);
  animation: fadeIn .15s;
}
.tb-menu-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.tb-menu-name { font-weight: 700; font-size: 14px; color: #fff; }
.tb-menu-email { font-size: 11.5px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 1px; }
.tb-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text-mid);
  font-size: 13.5px;
  font-weight: 500;
  width: 100%;
  border: 0;
  background: transparent;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
}
.tb-menu-item span:first-child,
.tb-menu-item .tb-menu-ico {
  display: inline-grid; place-items: center;
  width: 20px; height: 20px;
  color: var(--text-mid);
  flex-shrink: 0;
}
.tb-menu-item:hover .tb-menu-ico { color: var(--accent); }
.tb-menu-item.logout .tb-menu-ico { color: var(--neg); }
.tb-menu-item:hover { background: var(--bg-card-hi); color: var(--text); }
.tb-menu-item.logout { color: var(--neg); }
.tb-menu-item.logout:hover { background: color-mix(in oklch, var(--neg) 12%, transparent); }
.tb-menu-sep { height: 1px; background: var(--line); margin: 4px 0; }
.sidebar.collapsed .sidebar-brand { padding: 0; justify-content: center; }

.sidebar-tabs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
  padding: 14px;
  border-bottom: 1px solid var(--line);
}
.sidebar.collapsed .sidebar-tabs { display: none; }
.sb-tab {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--text-mid);
  font-size: 12px;
  font-weight: 600;
}
.sb-tab.active {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  border: 1.5px solid var(--accent);
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 16px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 20px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
.sb-tab:hover:not(.active) { color: var(--text); border-color: var(--line-hi); }

.sidebar-search {
  padding: 12px 14px 6px;
}
.sidebar.collapsed .sidebar-search { display: none; }
.sidebar-search .search { max-width: none; padding: 6px 12px; }

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex; flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
}
.sb-item {
  display: flex; align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-radius: 999px;
  color: var(--text-mid);
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  position: relative;
  background: var(--bg-card);
  border: 1px solid transparent;
  margin-bottom: 6px;
}
.sb-item:hover { color: var(--text); background: var(--bg-card-hi); }
.sb-item.active {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  font-weight: 700;
  border: 1.5px solid var(--accent);
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 20px color-mix(in oklch, var(--accent) 50%, transparent),
    0 0 26px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
.sb-item.active .sb-icon { color: #fff; filter: drop-shadow(0 0 6px var(--accent)); }
.sb-icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  color: var(--text-mid);
  flex-shrink: 0;
}
.sb-item:hover:not(.active) .sb-icon { color: var(--accent); }
.sb-item .live {
  margin-left: auto;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 8px var(--live), 0 0 0 2px rgba(255,255,255,0.95);
  animation: pulse 1.6s infinite;
}
.sidebar.collapsed .sb-item {
  width: 44px;
  height: 44px;
  padding: 0;
  margin: 6px auto;
  border-radius: 14px;
  justify-content: center;
}
.sidebar.collapsed .sb-label,
.sidebar.collapsed .sb-item .live,
.sidebar.collapsed .sb-item.active::before { display: none; }
.sidebar.collapsed .sb-item.active {
  width: 44px;
  height: 44px;
  padding: 0;
  margin: 6px auto;
  border-radius: 14px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 35%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  border: 2px solid var(--accent);
  box-shadow:
    0 0 0 4px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 24px color-mix(in oklch, var(--accent) 60%, transparent),
    0 0 26px color-mix(in oklch, var(--accent) 20%, transparent) inset,
    0 6px 18px rgba(0,0,0,.45);
}
.sidebar.collapsed .sb-item.active .sb-icon { color: #fff; filter: drop-shadow(0 0 8px var(--accent)); }

.sidebar-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border-top: 1px solid var(--line);
}

/* sidebar extra: language + deposit (above socials) */
.sidebar-extra {
  padding: 12px 14px 4px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid var(--line);
}
.sidebar.collapsed .sidebar-extra { display: none; }
.sb-lang-wrap { position: relative; }
.sb-lang {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 9px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, var(--bg-card) 0%, color-mix(in oklch, var(--bg-card) 80%, #000) 100%);
  color: var(--text);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.sb-lang:hover, .sb-lang.open { border-color: var(--line-hi); }
.sb-lang.open .sb-lang-caret { transform: rotate(180deg); }
.sb-lang-globe { color: var(--text-mid); flex-shrink: 0; }
.sb-flag {
  display: inline-flex; width: 18px; height: 12px;
  border-radius: 2px; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,.1);
  flex-shrink: 0;
}
.sb-lang-label { flex: 1; text-align: left; }
.sb-lang-caret { color: var(--text-mid); transition: transform .15s; }

.sb-lang-menu {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--bg-elev);
  border: 1px solid var(--line-hi);
  border-radius: 12px;
  padding: 4px;
  z-index: 50;
  box-shadow: 0 10px 30px rgba(0,0,0,.5), 0 0 0 1px color-mix(in oklch, var(--accent) 14%, transparent);
  animation: fadeIn .15s;
}
.sb-lang-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 9px 12px;
  border-radius: 8px;
  border: 0;
  background: transparent;
  color: var(--text-mid);
  font: inherit;
  font-size: 13.5px;
  cursor: pointer;
  text-align: left;
}
.sb-lang-item:hover { background: var(--bg-card-hi); color: var(--text); }
.sb-lang-item.active { color: var(--accent-2); }
.sb-lang-item > span:nth-child(2) { flex: 1; }
.sb-lang-item svg:last-child { color: var(--accent); }

.sb-money {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.sb-deposit,
.sb-withdraw {
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text-mid);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.01em;
  cursor: pointer;
  font-family: inherit;
  transition: border-color .15s, color .15s, background .15s, box-shadow .15s;
}
.sb-deposit:hover,
.sb-withdraw:hover {
  color: #fff;
  border-color: var(--line-hi);
  filter: brightness(1.06);
  background: transparent;
  box-shadow: none;
  text-shadow: none;
}
.sidebar.collapsed .sidebar-foot { flex-direction: column; gap: 8px; padding: 12px 8px; }
.sidebar.collapsed .sb-socials { display: none; }
.sb-socials { display: flex; gap: 6px; }
.sb-social {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--text-mid);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
}
.sb-social:hover { color: var(--text); border-color: var(--line-hi); }
.sb-collapse {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--text-mid);
  display: grid; place-items: center;
}
.sb-collapse:hover { color: var(--text); border-color: var(--line-hi); }

/* ── PROMO RIBBON ──────────────────────── */
.promo-ribbon {
  display: flex; align-items: center; gap: 22px;
  padding: 11px 18px;
  margin: 14px 0 0;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
  overflow: hidden;
  font-size: 13px;
  white-space: nowrap;
}
.promo-ribbon .track {
  display: flex; gap: 36px;
  animation: ribbon 38s linear infinite;
}
.promo-ribbon .item {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-mid);
  font-weight: 500;
}
.promo-ribbon .item .dot {
  color: var(--accent-2);
  font-size: 14px;
}
@keyframes ribbon {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── FEATURE TILES (3-up under hero) ───── */
.feature-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 18px;
}
.feature-tile {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  padding: 22px;
  min-height: 170px;
  display: flex; flex-direction: column; justify-content: space-between;
  background:
    radial-gradient(ellipse at 80% 20%, color-mix(in oklch, var(--ft-hue) 35%, transparent) 0%, transparent 65%),
    var(--bg-card);
  border: 1px solid var(--line);
  isolation: isolate;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.feature-tile::after {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 1px, transparent 1px 12px);
  z-index: -1;
  pointer-events: none;
}
.feature-tile:hover { border-color: var(--line-hi); transform: translateY(-2px); }
.ft-tag {
  align-self: flex-start;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--bg-card-hi);
  border: 1px solid var(--line);
  color: var(--text-mid);
}
.ft-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.05;
  margin: 14px 0 4px;
}
.ft-sub { font-size: 12.5px; color: var(--text-dim); }

/* shrink container padding when sidebar is present */
.shell-main .container { padding-left: 22px; padding-right: 22px; }

/* ── HEADER ────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 60;
  height: var(--header-h);
  display: flex;
  align-items: center;
  background: color-mix(in oklch, var(--bg) 88%, transparent);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.header.scrolled {
  border-bottom-color: var(--line);
  background: color-mix(in oklch, var(--bg) 96%, transparent);
}
.header-inner {
  display: flex; align-items: center; gap: 28px;
  width: 100%;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: var(--accent-grad);
  display: grid; place-items: center;
  font-size: 16px; font-weight: 800;
  color: var(--accent-ink);
  box-shadow: var(--accent-glow);
}
.nav { display: flex; align-items: center; gap: 4px; flex: 1; }
.nav a {
  padding: 8px 12px;
  border-radius: 8px;
  color: var(--text-mid);
  font-weight: 500;
  font-size: 13.5px;
  transition: background .15s, color .15s;
}
.nav a:hover { color: var(--text); background: var(--bg-card); }
.nav a.active { color: var(--text); background: var(--bg-card); }
.nav a .pill {
  margin-left: 6px;
  font-size: 9.5px;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 999px;
  background: var(--accent);
  color: var(--accent-ink);
  letter-spacing: 0.04em;
}

.header-actions { display: flex; align-items: center; gap: 8px; }
.balance {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 6px 6px 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 500;
}
.balance .coin { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg,#facc15,#f59e0b); display: inline-block; }
.balance .deposit-btn {
  margin-left: 4px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  border: 1.5px solid var(--accent);
  padding: 6px 14px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 12px;
  font-family: var(--font-body);
  display: flex; align-items: center; gap: 4px;
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 18px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 24px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
.balance .deposit-btn::before { content: '+'; font-size: 14px; line-height: 1; }
.btn {
  border: 1px solid var(--line-hi);
  background: linear-gradient(180deg, var(--bg-card-hi), var(--bg-card));
  color: var(--text);
  padding: 8px 16px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 13px;
  transition: border-color .15s, box-shadow .15s, filter .15s;
  box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 4px 12px rgba(0,0,0,.3);
}
.btn:hover {
  color: #fff;
  border-color: var(--line-hi);
  filter: brightness(1.06);
}
.btn.primary {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  border: 1.5px solid var(--accent);
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.01em;
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 4px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 20px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 32px color-mix(in oklch, var(--accent) 20%, transparent) inset,
    0 6px 20px rgba(0,0,0,.45);
}
.btn.primary:hover {
  filter: brightness(1.12);
  box-shadow:
    0 0 0 4px color-mix(in oklch, var(--accent) 22%, transparent),
    0 0 28px color-mix(in oklch, var(--accent) 70%, transparent),
    0 0 36px color-mix(in oklch, var(--accent) 26%, transparent) inset,
    0 8px 24px rgba(0,0,0,.5);
}
.btn.ghost { padding: 8px 14px; background: transparent; border-color: var(--line); }
.btn.ghost:hover { background: var(--bg-card); border-color: var(--line-hi); filter: none; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text-mid);
  display: grid; place-items: center;
}
.icon-btn:hover { color: var(--text); border-color: var(--line-hi); }

/* ── HERO ───────────────────────────────── */
.hero {
  position: relative;
  margin-top: 20px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  height: 380px;
  isolation: isolate;
  color: #f3f1ff;
}
.hero .hero-sub { color: rgba(243,241,255,0.74); }
.hero-slide {
  position: absolute; inset: 0;
  display: flex;
  transition: opacity .5s ease;
  opacity: 0;
  pointer-events: none;
}
.hero-slide.active { opacity: 1; pointer-events: auto; }
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, color-mix(in oklch, var(--hero-hue) 50%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, color-mix(in oklch, var(--hero-hue-2) 40%, transparent) 0%, transparent 50%),
    linear-gradient(135deg, #0a0a16, #14122a 60%, #1a0c20);
  z-index: -1;
}
.hero-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0 1px, transparent 1px 14px),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,.04) 0 1px, transparent 1px);
  background-size: auto, 24px 24px;
}
.hero-content {
  padding: 56px 60px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 60%;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent-2);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.hero-eyebrow .live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--live) 30%, transparent);
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .6; transform: scale(1.3); }
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 4.5vw, 64px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.04;
  white-space: pre-line;
  margin: 0 0 16px;
}
.hero-sub {
  color: var(--text-mid);
  font-size: 15px;
  max-width: 460px;
  margin-bottom: 28px;
}
.hero-cta {
  display: flex; align-items: center; gap: 10px;
}
.hero-cta .btn.primary { padding: 12px 20px; font-size: 14px; }
.hero-side {
  position: absolute;
  right: 60px; top: 50%; transform: translateY(-50%);
  width: 280px; height: 280px;
  border-radius: 24px;
  background:
    radial-gradient(circle at 50% 50%, color-mix(in oklch, var(--hero-hue) 60%, transparent) 0%, transparent 70%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 2px, transparent 2px 12px);
  border: 1px solid var(--line);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}
.hero-controls {
  position: absolute;
  bottom: 24px; right: 32px;
  display: flex; gap: 8px;
  z-index: 5;
}
.hero-dots {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 6px;
  z-index: 5;
}
.hero-dot {
  width: 24px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.18);
  border: 0; padding: 0;
  transition: background .15s, width .2s;
}
.hero-dot.active { background: var(--text); width: 36px; }

/* ── REWARDS BANNER ────────────────────── */
.rewards-wrap { margin-top: 18px; display: flex; flex-direction: column; gap: 14px; }

.rewards-banner {
  display: grid;
  grid-template-columns: 1.2fr 1.8fr;
  gap: 22px;
  align-items: center;
  padding: 18px 24px;
  border-radius: var(--radius-lg);
  position: relative;
  background:
    radial-gradient(ellipse 70% 80% at 0% 50%, color-mix(in oklch, var(--accent) 14%, transparent) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
  border: 1px solid color-mix(in oklch, var(--accent) 32%, var(--line));
  box-shadow:
    0 0 0 1px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 32px color-mix(in oklch, var(--accent) 12%, transparent),
    0 0 40px color-mix(in oklch, var(--accent) 12%, transparent) inset,
    0 8px 26px rgba(0,0,0,.4);
  isolation: isolate;
  overflow: hidden;
}
.rewards-banner::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 1px, transparent 1px 14px);
  pointer-events: none;
  z-index: -1;
}

.rb-brand {
  display: flex; align-items: center; gap: 14px;
  min-width: 0;
}
.rb-avatar-wrap {
  position: relative;
  width: 58px; height: 58px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.rb-big-avatar {
  width: 58px !important;
  height: 58px !important;
  font-size: 18px !important;
  border-width: 2px !important;
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 18px color-mix(in oklch, var(--accent) 50%, transparent) !important;
}
.rb-big-tier {
  width: 22px !important; height: 24px !important;
  bottom: -4px !important;
  background: var(--bg-card) !important;
}
.rb-big-tier svg { width: 14px; height: 15px; }
.rb-brand-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.rb-username {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: #fff;
  text-shadow: 0 0 14px color-mix(in oklch, var(--accent) 50%, transparent);
}
.rb-day {
  font-size: 12px;
  color: var(--text-mid);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.rb-hero { display: flex; align-items: center; justify-content: center; }
.rb-hero-art {
  width: 100%;
  height: 96px;
  border-radius: 14px;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 1px, transparent 1px 10px),
    linear-gradient(135deg,
      color-mix(in oklch, var(--accent) 22%, var(--bg-card)) 0%,
      var(--bg-card) 80%);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  border: 1px dashed color-mix(in oklch, var(--accent) 30%, var(--line));
}

.rb-user { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.rb-user-row { display: flex; align-items: center; gap: 12px; }
.rb-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 35%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  border: 1.5px solid var(--accent);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-weight: 800;
  color: #fff;
  font-size: 16px;
  text-shadow: 0 0 8px var(--accent);
  box-shadow: 0 0 14px color-mix(in oklch, var(--accent) 40%, transparent);
}
.rb-userid {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

.rb-progress-track {
  height: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.06);
  overflow: hidden;
  border: 1px solid var(--line);
}
.rb-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 12px var(--accent);
}
.rb-progress-meta {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  font-size: 12px;
  color: var(--text-mid);
  gap: 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
}
.rb-progress-meta strong { color: var(--accent-2); font-weight: 700; }
.rb-progress-meta strong.next { color: #f59e0b; }
.rb-progress-count { color: var(--text-dim); font-weight: 500; }
.rb-tier-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  vertical-align: -1px;
  margin-left: 2px;
}
.rb-tier-dot.u { background: linear-gradient(135deg, #6b7280, #374151); border: 1px solid rgba(255,255,255,.18); }
.rb-tier-dot.b { background: linear-gradient(135deg, #d97706, #92400e); border: 1px solid rgba(255,255,255,.2); }

.rb-timer {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 4px;
  position: relative;
  padding-right: 44px;
  text-align: right;
}
.rb-timer-label {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.rb-timer-val {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.rb-lock {
  position: absolute;
  right: 0; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--accent);
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: var(--accent-2);
  display: grid; place-items: center;
  box-shadow: 0 0 14px color-mix(in oklch, var(--accent) 40%, transparent);
}

/* category tabs */
.rewards-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.rewards-tabs::-webkit-scrollbar { display: none; }
.rt {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, var(--bg-card) 0%, color-mix(in oklch, var(--bg-card) 80%, #000) 100%);
  color: var(--text-mid);
  font-size: 13.5px;
  font-weight: 600;
  white-space: nowrap;
  transition: color .15s, border-color .15s, background .15s;
  font-family: var(--font-body);
}
.rt:hover { color: var(--text); border-color: var(--line-hi); }
.rt-icon { display: inline-grid; place-items: center; color: var(--text-mid); }
.rt:hover .rt-icon { color: var(--accent); }
.rt.active {
  color: #fff;
  font-weight: 700;
  border: 1.5px solid var(--accent);
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 60%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 18px color-mix(in oklch, var(--accent) 50%, transparent),
    0 0 22px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
.rt.active .rt-icon { color: #fff; filter: drop-shadow(0 0 6px var(--accent)); }

@media (max-width: 1100px) {
  .rewards-banner { grid-template-columns: 1fr 1fr; gap: 14px; }
  .rb-timer { align-items: flex-start; text-align: left; padding-right: 0; }
  .rb-lock { right: auto; left: auto; position: static; transform: none; margin-top: 6px; }
}
@media (max-width: 700px) {
  .rewards-banner { grid-template-columns: 1fr; }
}
.promo-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 16px;
}

/* ── CATEGORY VIEW ──────────────────────── */
.cv-foot {
  display: flex; justify-content: center;
  margin-top: 24px;
}
.cv-view-all {
  padding: 12px 28px;
  border-radius: 12px;
  border: 1.5px solid var(--accent);
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 22%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.02em;
  cursor: pointer;
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 18px color-mix(in oklch, var(--accent) 50%, transparent);
  transition: filter .15s;
}
.cv-view-all:hover { filter: brightness(1.1); }

/* ── SPORTS SECTION ─────────────────────── */
.sports-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.sport-card {
  display: flex; flex-direction: column;
  gap: 14px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
}
.sport-card.live { border-color: color-mix(in oklch, var(--live) 28%, var(--line)); }
.sport-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11.5px;
  font-family: var(--font-mono);
}
.sport-league {
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.sport-time { color: var(--text-mid); }
.sport-live {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--live);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.sport-live .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 8px var(--live);
  animation: pulse 1.5s infinite;
}
.sport-teams {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
}
.sport-team {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600;
  font-size: 14px;
  color: #fff;
  min-width: 0;
}
.sport-team:last-child { justify-content: flex-end; }
.sport-team > span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sport-team-logo {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, oklch(0.55 0.18 var(--logo-hue)), oklch(0.32 0.16 calc(var(--logo-hue) + 60)));
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  text-shadow: 0 1px 2px rgba(0,0,0,.5);
}
.sport-score {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 18px;
  color: var(--live);
  padding: 0 8px;
}
.sport-odds {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.sport-odd {
  display: flex; flex-direction: column;
  gap: 2px;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--text);
  font-family: var(--font-mono);
  cursor: pointer;
  transition: border-color .15s, color .15s, filter .15s;
}
.sport-odd:hover:not(:disabled) {
  color: #fff;
  border-color: var(--accent);
  filter: brightness(1.06);
}
.sport-odd:disabled { opacity: .4; cursor: not-allowed; }
.sport-odd span { font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.04em; }
.sport-odd strong { font-size: 14px; font-weight: 700; color: var(--accent-2); }
@media (max-width: 900px) {
  .sports-grid { grid-template-columns: 1fr; }
}

/* ── PROMOTION SECTION ──────────────────── */
.promo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.promo-card {
  position: relative;
  display: flex; flex-direction: column;
  padding: 22px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  background:
    radial-gradient(ellipse at 100% 0%, color-mix(in oklch, var(--promo-hue) 22%, transparent) 0%, transparent 60%),
    var(--bg-card);
  isolation: isolate;
  min-height: 240px;
  overflow: hidden;
}
.promo-card::before {
  content: '';
  position: absolute;
  right: -50px; top: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in oklch, var(--promo-hue) 30%, transparent) 0%, transparent 70%);
  z-index: -1;
}
.promo-card-tag {
  align-self: flex-start;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--bg-card-hi);
  border: 1px solid color-mix(in oklch, var(--promo-hue) 40%, var(--line));
  color: var(--promo-hue);
  margin-bottom: 14px;
}
.promo-card-art {
  height: 96px;
  border-radius: 10px;
  margin-bottom: 14px;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 1px, transparent 1px 10px),
    linear-gradient(135deg, color-mix(in oklch, var(--promo-hue) 35%, var(--bg-card-hi)) 0%, var(--bg-card-hi) 100%);
  border: 1px dashed color-mix(in oklch, var(--promo-hue) 30%, var(--line));
}
.promo-card-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0 0 6px;
  color: #fff;
}
.promo-card-sub {
  font-size: 12.5px;
  color: var(--text-mid);
  margin: 0 0 18px;
  line-height: 1.5;
  flex: 1;
}
.promo-card-cta {
  align-self: flex-start;
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid var(--line-hi);
  background: linear-gradient(180deg, var(--bg-card-hi) 0%, var(--bg-card) 100%);
  color: var(--text);
  font: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s, color .15s, filter .15s;
}
.promo-card-cta:hover {
  color: #fff;
  border-color: var(--accent);
  filter: brightness(1.06);
}
@media (max-width: 1100px) {
  .promo-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  .promo-grid { grid-template-columns: 1fr; }
}

/* ── CATEGORY TABS (replaces promo strip) ─ */
.cat-tabs {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 10px;
  padding-bottom: 4px;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, var(--bg-card) 0%, color-mix(in oklch, var(--bg-card) 80%, #000) 100%);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: color .15s, border-color .15s, filter .15s;
  font-family: var(--font-body);
  cursor: pointer;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cat-tab:hover { border-color: var(--line-hi); filter: brightness(1.06); }
.cat-tab-icon { display: inline-grid; place-items: center; color: var(--text-mid); }
.cat-tab:hover .cat-tab-icon { color: var(--accent); }
.cat-tab.active {
  color: #fff;
  font-weight: 700;
  border: 1.5px solid var(--accent);
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 18px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 22px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
.cat-tab.active .cat-tab-icon { color: #fff; filter: drop-shadow(0 0 6px var(--accent)); }
.promo {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: var(--bg-grad-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  transition: border-color .15s, transform .15s, box-shadow .15s;
}
.promo:hover {
  border-color: transparent;
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(0,0,0,.4),
              0 0 0 1px color-mix(in oklch, var(--accent) 35%, transparent);
}
.promo-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: grid; place-items: center;
  font-size: 18px;
  background: color-mix(in oklch, var(--promo-hue) 18%, var(--bg-card-hi));
  color: var(--promo-hue);
  border: 1px solid color-mix(in oklch, var(--promo-hue) 30%, var(--line));
  font-family: var(--font-mono);
}
.promo-text { display: flex; flex-direction: column; }
.promo-title { font-weight: 600; font-size: 14px; }
.promo-sub { color: var(--text-dim); font-size: 12.5px; }

/* ── SECTION ────────────────────────────── */
section.lobby-section { margin-top: 44px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  gap: 18px;
  flex-wrap: wrap;
}
.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.section-title .count {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--bg-card);
  border: 1px solid var(--line);
}
.section-actions { display: flex; gap: 8px; align-items: center; }
.section-actions .arrow {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--text-mid);
  display: grid; place-items: center;
  transition: background .15s, color .15s;
}
.section-actions .arrow:hover { background: var(--bg-card-hi); color: var(--text); border-color: var(--line-hi); }
.section-actions .arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.see-all {
  font-size: 12.5px;
  color: var(--text-mid);
  padding: 6px 10px;
  border-radius: 8px;
  white-space: nowrap;
}
.see-all:hover { color: var(--text); background: var(--bg-card); }

/* ── FILTER BAR ─────────────────────────── */
.filter-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 14px;
  flex: 1;
  min-width: 220px;
  max-width: 320px;
  transition: border-color .15s;
}
.search:focus-within { border-color: var(--accent); }
.search svg { color: var(--text-dim); flex-shrink: 0; }
.search input {
  flex: 1;
  background: transparent;
  border: 0;
  outline: 0;
  color: inherit;
  font: inherit;
  padding: 6px 0;
}
.search input::placeholder { color: var(--text-dim); }
.search kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 2px 5px;
  border-radius: 4px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--text-dim);
}

.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 7px 12px;
  font-size: 12.5px;
  font-weight: 500;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--text-mid);
  transition: all .15s;
  white-space: nowrap;
}
.chip:hover { color: var(--text); border-color: var(--line-hi); }
.chip.active {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  border: 1.5px solid var(--accent);
  font-weight: 700;
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 16px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 20px color-mix(in oklch, var(--accent) 18%, transparent) inset;
}
[data-theme="light"] .chip.active {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
}

.sort {
  display: flex; align-items: center; gap: 6px;
  font-size: 12.5px;
  color: var(--text-mid);
  margin-left: auto;
}
.sort select {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font: inherit;
  outline: none;
}

/* ── GAME RAIL ──────────────────────────── */
.rail-wrap { position: relative; }
.rail {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(170px, 1fr);
  gap: var(--rail-gap);
  overflow-x: auto;
  overflow-y: visible;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  padding: 10px 4px 16px;
  margin: -10px -4px -16px;
  scrollbar-width: none;
}
.rail::-webkit-scrollbar { display: none; }
.rail.compact { grid-auto-columns: minmax(140px, 1fr); }
.rail.comfy { grid-auto-columns: minmax(200px, 1fr); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: var(--rail-gap);
  padding: 10px 0 16px;
  margin: -10px 0 -16px;
}
.grid.compact { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
.grid.comfy { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }

/* ── GAME CARD ──────────────────────────── */
.gcard {
  position: relative;
  border-radius: var(--radius);
  background: var(--bg-grad-card);
  border: 1px solid var(--line);
  cursor: pointer;
  scroll-snap-align: start;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  isolation: isolate;
}
.gcard:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,.55);
  border-color: var(--line-hi);
}
.gcard-art {
  position: relative;
  aspect-ratio: var(--card-aspect);
  background:
    linear-gradient(135deg,
      color-mix(in oklch, var(--accent) 42%, #0a0e16) 0%,
      color-mix(in oklch, var(--accent) 18%, #0a0e16) 55%,
      #0a0e16 100%);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 10px;
  overflow: hidden;
}
.gcard-art::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 1px, transparent 1px 9px);
  pointer-events: none;
}
.gcard-art::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.55), transparent 50%);
  pointer-events: none;
}
.gcard-tag {
  align-self: flex-start;
  position: relative; z-index: 2;
  padding: 3px 7px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: rgba(0,0,0,.55);
  color: #fff;
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.14);
}
.gcard-tag.hot { background: linear-gradient(135deg, var(--accent-3), color-mix(in oklch, var(--accent-3) 70%, #000)); border-color: transparent; color: var(--accent-ink); }
.gcard-tag.new { background: var(--accent-grad); border-color: transparent; color: var(--accent-ink); box-shadow: var(--accent-glow); }
.gcard-art .ph-label {
  position: absolute;
  inset: 0;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,255,255,.45);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  z-index: 1;
}
.gcard-players {
  position: relative; z-index: 2;
  align-self: flex-start;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: rgba(255,255,255,.85);
}
.gcard-players .live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 6px var(--live);
}
.gcard-meta {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.gcard-title {
  font-weight: 600;
  font-size: 13.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gcard-provider {
  font-size: 11.5px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.gcard-hover {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(8,8,12,.92) 0%, rgba(8,8,12,.55) 60%, rgba(8,8,12,.2) 100%);
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px;
  opacity: 0;
  transition: opacity .2s;
  z-index: 3;
  pointer-events: none;
}
.gcard-hover .quick-info {
  position: absolute;
  left: 0; right: 0; bottom: 12px;
  justify-content: center;
}
.gcard:hover .gcard-hover { opacity: 1; pointer-events: auto; }
.play-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 32%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  border: 2px solid var(--accent);
  display: grid; place-items: center;
  text-shadow: 0 0 12px var(--accent);
  box-shadow:
    0 0 0 4px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 24px color-mix(in oklch, var(--accent) 55%, transparent),
    0 0 28px color-mix(in oklch, var(--accent) 20%, transparent) inset,
    0 12px 32px rgba(0,0,0,.5);
  transition: transform .15s, filter .15s;
}
.play-btn:hover { filter: brightness(1.12); }
.gcard:hover .play-btn { transform: scale(1.06); }
.gcard-hover .quick-info {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: rgba(255,255,255,.75);
  display: flex; gap: 12px;
}

/* ── LEADERBOARD ────────────────────────── */
.leaderboard-wrap {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}
.leaderboard {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.lb-head {
  display: grid;
  grid-template-columns: 40px 1.4fr 1.4fr 90px 90px 1fr;
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--line);
}
.lb-row {
  display: grid;
  grid-template-columns: 40px 1.4fr 1.4fr 90px 90px 1fr;
  padding: 12px 18px;
  align-items: center;
  font-size: 13px;
  border-bottom: 1px solid var(--line);
  transition: background .12s;
}
.lb-row:last-child { border-bottom: 0; }
.lb-row:hover { background: var(--bg-card-hi); }
.lb-row.fresh { animation: flash .8s; }
@keyframes flash {
  0% { background: color-mix(in oklch, var(--accent) 14%, transparent); }
  100% { background: transparent; }
}
.lb-rank {
  font-family: var(--font-mono);
  color: var(--text-dim);
  font-size: 12px;
}
.lb-rank.top {
  color: var(--accent);
  font-weight: 700;
}
.lb-user { display: flex; align-items: center; gap: 10px; font-weight: 500; }
.lb-avatar {
  width: 26px; height: 26px;
  border-radius: 999px;
  background: var(--avatar-bg);
  border: 1px solid var(--line);
}
.lb-game { color: var(--text-mid); font-size: 12.5px; }
.lb-num { font-family: var(--font-mono); font-size: 12.5px; }
.lb-payout { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--accent); text-align: right; }

/* ── TOURNAMENTS ────────────────────────── */
.tourn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.tourn {
  position: relative;
  padding: 22px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  background:
    radial-gradient(ellipse at 100% 0%, color-mix(in oklch, var(--tourn-hue) 22%, transparent) 0%, transparent 60%),
    var(--bg-card);
  overflow: hidden;
  isolation: isolate;
  display: flex; flex-direction: column;
  min-height: 200px;
}
.tourn::before {
  content: '';
  position: absolute;
  right: -40px; top: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in oklch, var(--tourn-hue) 35%, transparent) 0%, transparent 70%);
  z-index: -1;
}
.tourn-tag {
  align-self: flex-start;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--bg-card-hi);
  border: 1px solid var(--line);
  color: var(--text-mid);
  margin-bottom: 14px;
}
.tourn-tag.hot { color: var(--accent-3); border-color: color-mix(in oklch, var(--accent-3) 40%, var(--line)); }
.tourn-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0 0 4px;
}
.tourn-prize {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  margin: 12px 0 6px;
  letter-spacing: -0.01em;
}
.tourn-prize-label { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
.tourn-foot {
  margin-top: auto;
  padding-top: 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line);
  margin-top: 18px;
}
.tourn-meta {
  display: flex; flex-direction: column; gap: 1px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-mid);
}
.tourn-meta span:first-child { color: var(--text-dim); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
.tourn .btn { padding: 7px 14px; font-size: 12px; }

/* ── PROVIDERS ──────────────────────────── */
.providers {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}
.provider {
  height: 64px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--bg-card);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  color: var(--text-mid);
  transition: all .15s;
  letter-spacing: -0.01em;
}
.provider:hover { color: var(--text); border-color: var(--line-hi); background: var(--bg-card-hi); }

/* ── FOOTER ─────────────────────────────── */
.footer-min {
  margin-top: 80px;
  padding: 60px 0 40px;
  border-top: 1px solid var(--line);
  text-align: center;
}
.footer-min .container { display: flex; flex-direction: column; align-items: center; gap: 18px; }
.footer-min-logo img {
  height: 28px;
  width: auto;
  filter: drop-shadow(0 0 16px color-mix(in oklch, var(--accent) 35%, transparent));
}
.footer-min-notice {
  margin: 0;
  font-size: 13px;
  color: var(--text-mid);
  max-width: 900px;
  line-height: 1.7;
}
.footer-min-copy {
  margin: 0;
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.footer {
  margin-top: 80px;
  padding: 60px 0 32px;
  border-top: 1px solid var(--line);
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr repeat(4, 1fr);
  gap: 32px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--line);
}
.footer-brand-block { display: flex; flex-direction: column; gap: 14px; }
.footer-brand-block p { color: var(--text-dim); font-size: 13px; max-width: 280px; line-height: 1.6; }
.footer-col h4 {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); margin: 6px 0 16px; font-weight: 600;
}
.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer-col a { color: var(--text-mid); font-size: 13px; }
.footer-col a:hover { color: var(--text); }
.footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 28px;
  font-size: 12px;
  color: var(--text-dim);
  flex-wrap: wrap; gap: 16px;
}
.payments { display: flex; gap: 8px; align-items: center; }
.payment {
  width: 44px; height: 28px;
  border-radius: 6px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--text-mid);
  display: grid; place-items: center;
  letter-spacing: 0.04em;
}
.legal { display: flex; gap: 18px; flex-wrap: wrap; }
.legal a:hover { color: var(--text); }

/* ── MODAL ──────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(4,4,8,.74);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: grid; place-items: center;
  padding: 24px;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  overflow: auto;
  resize: both;
  min-width: 320px;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  animation: scaleIn .25s cubic-bezier(.22,.9,.3,1.2);
  box-shadow: 0 30px 80px rgba(0,0,0,.5);
}
.modal.sm { max-width: 420px; resize: none; }
@keyframes scaleIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-mid);
  display: grid; place-items: center;
}
.modal-close:hover { color: var(--text); border-color: var(--line-hi); }
.modal-body { padding: 24px; overflow-y: auto; }

.game-modal-art {
  width: 280px;
  max-width: 100%;
  aspect-ratio: 1 / 1;
  height: auto;
  margin: 0 auto 20px;
  background: var(--gm-bg);
  border-radius: var(--radius-lg);
  position: relative; overflow: hidden;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,.55);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  padding: 16px;
}
.game-modal-art::after {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 1px, transparent 1px 12px);
}
.game-modal-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 18px 0;
}
.game-modal-stat {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
}
.game-modal-stat-label {
  font-size: 10.5px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.game-modal-stat-val {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  margin-top: 4px;
}
.modal-foot {
  display: flex; gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--line);
  background: var(--bg-card);
}
.modal-foot .btn { flex: 1; padding: 12px; font-size: 14px; }

/* sign in form */
.signin-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 999px; margin-bottom: 18px; }
.signin-tab {
  flex: 1; padding: 8px; border: 0; background: transparent;
  border-radius: 999px; font-size: 13px; font-weight: 500; color: var(--text-mid);
}
.signin-tab.active {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in oklch, var(--accent) 28%, var(--bg-elev)) 0%, var(--bg-elev) 75%),
    var(--bg-elev);
  color: #fff;
  border: 1.5px solid var(--accent);
  font-weight: 700;
  text-shadow: 0 0 10px color-mix(in oklch, var(--accent) 70%, transparent);
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent),
    0 0 16px color-mix(in oklch, var(--accent) 55%, transparent);
}
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field label { font-size: 11.5px; color: var(--text-mid); font-weight: 500; }
.field input {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 11px 13px;
  font: inherit;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); }
.field .err { font-size: 11.5px; color: var(--neg); }
.signin-foot { font-size: 12.5px; color: var(--text-dim); text-align: center; margin-top: 14px; }
.signin-foot a { color: var(--accent-2); }

/* responsive */
@media (max-width: 1100px) {
  .promo-strip { grid-template-columns: repeat(2, 1fr); }
  .leaderboard-wrap { grid-template-columns: 1fr; }
  .tourn-grid { grid-template-columns: 1fr; }
  .providers { grid-template-columns: repeat(3, 1fr); }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .hero-side { display: none; }
  .hero-content { width: 100%; }
  .hero-content { padding: 40px 32px; }
  .hero-title { font-size: clamp(28px, 5vw, 44px); }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .search { max-width: none; }
  .sort { margin-left: 0; justify-content: flex-end; }
  .cat-tabs { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 900px) {
  :root { --header-h: 56px; }
  .shell-main,
  .shell.collapsed .shell-main { margin-left: 0; }
  .sidebar,
  .sidebar.collapsed {
    width: 100vw;
    max-width: 100vw;
    transform: translateX(-100%);
    transition: transform .25s cubic-bezier(.22,.9,.3,1.1);
    box-shadow: 16px 0 40px rgba(0,0,0,.5);
    padding-bottom: 64px;
  }
  .shell.mobile-open .sidebar { transform: translateX(0); display: flex; }
  .sidebar-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 69;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .shell.mobile-open .sidebar-backdrop { opacity: 1; pointer-events: auto; }
  /* mobile drawer ignores collapsed state — always show full layout */
  .sidebar.collapsed .sidebar-tabs,
  .sidebar.collapsed .sidebar-search,
  .sidebar.collapsed .sidebar-extra,
  .sidebar.collapsed .sb-tier,
  .sidebar.collapsed .sb-socials,
  .sidebar.collapsed .sb-label,
  .sidebar.collapsed .sb-item .live { display: flex !important; }
  .sidebar.collapsed .sidebar-tabs { display: grid !important; }
  .sidebar.collapsed .sb-item {
    padding: 11px 16px !important;
    justify-content: flex-start !important;
    width: auto !important;
    height: auto !important;
    margin: 0 0 6px !important;
    border-radius: 999px !important;
  }
  .sidebar.collapsed .sidebar-brand { padding: 0 18px !important; justify-content: flex-start !important; }
  .sidebar .sidebar-search,
  .sidebar .sb-label,
  .sidebar .sb-item .live,
  .sidebar .sidebar-extra,
  .sidebar .sidebar-tabs,
  .sidebar .sb-tier { display: flex; }
  .sidebar .sidebar-tabs { display: grid; }
  .sidebar .sb-item { padding: 11px 16px; justify-content: flex-start; width: auto; height: auto; margin: 0 0 6px; border-radius: 999px; }
  .sidebar-foot { flex-direction: row; gap: 8px; padding: 12px 14px; }
  .sb-socials { flex-direction: row; gap: 8px; }
  .sb-social { width: 28px; height: 28px; }
  .sb-collapse { display: none; }
  .topbar-logo { height: 24px; }
  .hero { height: 320px; }
  .hero-content { padding: 32px 24px; }
  .hero-title { font-size: clamp(24px, 5vw, 36px); }
  .rewards-banner { grid-template-columns: 1fr; gap: 14px; padding: 16px 18px; }
  .promo-grid { grid-template-columns: repeat(2, 1fr); }
  .lb-head, .lb-row { grid-template-columns: 32px 1fr 1fr 70px 60px 1fr; padding: 10px 12px; font-size: 12px; }
  .lb-game { display: none; }
  .lb-head { grid-template-columns: 32px 1fr 1fr 70px 60px 1fr; }
  .tb-balance-rows { flex-direction: column; gap: 2px; align-items: flex-start; }
  .tb-balance { padding: 6px 10px; }
  .tb-balance-row { font-size: 11.5px; gap: 6px; }
  .tb-user-name { display: none; }

  /* category tabs — horizontal scroll on mobile */
  .cat-tabs {
    display: flex;
    flex-wrap: nowrap;
    grid-auto-columns: unset;
    grid-auto-flow: unset;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 16px 6px;
    margin: 18px -16px 0;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
  }
  .cat-tab {
    flex: 0 0 auto;
    padding: 10px 16px;
    font-size: 13px;
    scroll-snap-align: start;
  }
}
@media (max-width: 700px) {
  .container { padding: 0 16px; }
  .nav { display: none; }
  .promo-strip { grid-template-columns: 1fr; }
  .promo-grid { grid-template-columns: 1fr; }
  .providers { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: 1fr; }
  .gcard-meta { padding: 8px 10px 10px; }
  .section-title { font-size: 18px; }
  .hero { height: 280px; }
  .hero-title { font-size: clamp(22px, 5.5vw, 32px); }
  .header-actions { gap: 6px; }
  .header-actions .btn { padding: 7px 12px; font-size: 12.5px; }
  .promo-ribbon { font-size: 11.5px; }
  .game-modal-stats { grid-template-columns: 1fr; }
}


/* ── TWEAKS PANEL — gaming dark override ── */
.twk-panel {
  background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg-card) 100%) !important;
  color: var(--text) !important;
  border: 1px solid var(--accent) !important;
  border-radius: 16px !important;
  box-shadow:
    0 0 0 3px color-mix(in oklch, var(--accent) 12%, transparent),
    0 0 24px color-mix(in oklch, var(--accent) 28%, transparent),
    0 0 30px color-mix(in oklch, var(--accent) 16%, transparent) inset,
    0 16px 40px rgba(0,0,0,.55) !important;
  font-family: var(--font-body) !important;
}
.twk-hd {
  border-bottom: 1px solid var(--line) !important;
  padding: 12px 8px 12px 16px !important;
}
.twk-hd b {
  color: var(--accent-2) !important;
  font-family: var(--font-display) !important;
  font-size: 13px !important;
  font-weight: 700 !important;
  letter-spacing: 0.04em !important;
  text-transform: uppercase !important;
  text-shadow: 0 0 8px color-mix(in oklch, var(--accent) 60%, transparent);
}
.twk-x {
  color: var(--text-mid) !important;
  border: 1px solid var(--line) !important;
  border-radius: 6px !important;
}
.twk-x:hover {
  background: var(--bg-card-hi) !important;
  color: var(--text) !important;
  border-color: var(--accent) !important;
}
.twk-body {
  padding: 6px 14px 16px !important;
  scrollbar-color: color-mix(in oklch, var(--accent) 35%, transparent) transparent !important;
}
.twk-body::-webkit-scrollbar-thumb {
  background: color-mix(in oklch, var(--accent) 35%, transparent) !important;
  background-clip: content-box !important;
}
.twk-lbl > span:first-child { color: var(--text-mid) !important; font-weight: 600 !important; }
.twk-val { color: var(--accent-2) !important; font-family: var(--font-mono) !important; }
.twk-sect {
  color: var(--accent-2) !important;
  font-family: var(--font-mono) !important;
  font-size: 10px !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
  padding: 14px 0 4px !important;
  border-top: 1px solid var(--line);
  margin-top: 8px;
}
.twk-sect:first-child { border-top: 0; margin-top: 0; padding-top: 4px; }
.twk-field, select.twk-field {
  background: var(--bg-card) !important;
  border: 1px solid var(--line-hi) !important;
  color: var(--text) !important;
  border-radius: 8px !important;
  height: 30px !important;
}
.twk-field:focus, select.twk-field:focus {
  border-color: var(--accent) !important;
  background: var(--bg-card-hi) !important;
  box-shadow: 0 0 0 2px color-mix(in oklch, var(--accent) 18%, transparent);
}
select.twk-field {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%2329e8a3' d='M0 0h10L5 6z'/></svg>") !important;
}
.twk-slider {
  background: var(--bg-card) !important;
  height: 4px !important;
  border: 1px solid var(--line) !important;
}
.twk-slider::-webkit-slider-thumb {
  background: var(--accent) !important;
  border: 1.5px solid var(--accent-2) !important;
  box-shadow: 0 0 10px color-mix(in oklch, var(--accent) 60%, transparent), 0 1px 3px rgba(0,0,0,.5) !important;
  width: 14px !important; height: 14px !important;
}
.twk-slider::-moz-range-thumb {
  background: var(--accent) !important;
  border: 1.5px solid var(--accent-2) !important;
  box-shadow: 0 0 10px color-mix(in oklch, var(--accent) 60%, transparent), 0 1px 3px rgba(0,0,0,.5) !important;
  width: 14px !important; height: 14px !important;
}
.twk-seg {
  background: var(--bg-card) !important;
  border: 1px solid var(--line-hi) !important;
  border-radius: 8px !important;
}
.twk-seg button {
  color: var(--text-mid) !important;
  font-weight: 600 !important;
}
.twk-seg button[aria-pressed="true"] {
  background: color-mix(in oklch, var(--accent) 20%, var(--bg-elev)) !important;
  color: #fff !important;
  border-radius: 6px !important;
  box-shadow:
    0 0 0 1px var(--accent),
    0 0 12px color-mix(in oklch, var(--accent) 45%, transparent) !important;
  text-shadow: 0 0 8px color-mix(in oklch, var(--accent) 60%, transparent);
}
.twk-toggle, .twk-switch {
  background: var(--bg-card) !important;
  border: 1px solid var(--line-hi) !important;
}
.twk-toggle[aria-pressed="true"], .twk-switch[aria-checked="true"] {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  box-shadow: 0 0 12px color-mix(in oklch, var(--accent) 50%, transparent) !important;
}
.twk-color-wrap > button, .twk-swatch, .twk-color-opt {
  border: 1.5px solid var(--line-hi) !important;
  border-radius: 10px !important;
  background-clip: padding-box !important;
}
.twk-color-wrap > button[aria-pressed="true"],
.twk-color-opt[aria-pressed="true"],
.twk-color-opt.is-active {
  border-color: var(--accent-2) !important;
  box-shadow:
    0 0 0 2px color-mix(in oklch, var(--accent) 18%, transparent),
    0 0 14px color-mix(in oklch, var(--accent) 45%, transparent) !important;
}

.twk-seg-thumb {

  border: 1px solid var(--accent) !important;
  box-shadow:
    0 0 0 1px color-mix(in oklch, var(--accent) 30%, transparent),

/* ── ACCOUNT / DEPOSIT / WITHDRAWAL PAGES ─────────── */

/* Hero */

}

}

.ap-pencil { background: none; border: 0; color: var(--text-mid); cursor: pointer; padding: 4px; display: inline-grid; place-items: center; }

.ap-hero-balance {

  font-size: 26px;

}
.ap-refresh { background: none; border: 0; color: var(--text-mid); cursor: pointer; padding: 4px; display: inline-grid; place-items: center; }
.ap-refresh:hover { color: var(--accent-2); }

/* Quick actions / Banking grid */
.ap-grid {

}
.ap-panel {

.ap-btn {

}

}

/* Transactions */

.ap-tx-table { display: flex; flex-direction: column; }

.ap-btn-wide {

/* Withdrawal */

.ap-input-wrap { position: relative; margin-top: 10px; }

/* withdrawal saved-card switcher */

/* rollover banner on Account Overview */

/* vivid rollover title gradient */

}


/* refined vivid rollover title that suits the theme */
.ap-hero-rollover .ap-rollover-title {
  background: linear-gradient(95deg, var(--accent-2) 0%, var(--accent) 45%, #a855f7 100%) !important;
  -webkit-background-clip: text !important; background-clip: text !important;

/* rollover title — yellow gradient */

/* ── RECORD PAGES ───────────────────────── */

/* ── SECURITY CENTER ────────────────────── */

.cs-box {

.rec-pl.pos { color: var(--accent-2); font-family: var(--font-mono); font-weight: 700; }

/* ─── RAIL (with arrows) ─────────────────────── */
function Rail({ title, count, games, onOpen, density, icon }) {
  const ref = useRef(null);
  const [canL, setCanL] = useState(false);
  const [canR, setCanR] = useState(true);
  const update = () => {
    const el = ref.current;
    if (!el) return;
    setCanL(el.scrollLeft > 4);
    setCanR(el.scrollLeft + el.clientWidth < el.scrollWidth - 4);
  };
  useEffect(() => {
    update();
    const el = ref.current;
    el?.addEventListener('scroll', update);
    window.addEventListener('resize', update);
    return () => {
      el?.removeEventListener('scroll', update);
      window.removeEventListener('resize', update);
    };
  }, [games.length]);
  const scroll = (dir) => {
    const el = ref.current;
    if (!el) return;
    el.scrollBy({ left: dir * (el.clientWidth * 0.85), behavior: 'smooth' });
  };
  return (
    <section className="lobby-section" data-screen-label={title}>
      <div className="section-head">
        <h2 className="section-title">
          {icon && <Icon name={icon} size={18} />}
          {title}
          <span className="count">{count ?? games.length}</span>
        </h2>
        <div className="section-actions">
          <a href="#" className="see-all">See all →</a>
          <button className="arrow" onClick={() => scroll(-1)} disabled={!canL} aria-label="Scroll left">
            <Icon name="arrL" /></button>
          <button className="arrow" onClick={() => scroll(1)} disabled={!canR} aria-label="Scroll right">
            <Icon name="arrR" /></button>
        </div>
      </div>
      <div className="rail-wrap">
        <div className={`rail ${density}`} ref={ref}>
          {games.map((g) => <GameCard key={g.id} game={g} onOpen={onOpen} />)}
        </div>
      </div>
    </section>);

}

function FilteredGrid({ onOpen, density }) {

  const filtered = useMemo(() => {

    if (q.trim()) {
      const s = q.toLowerCase();
      xs = xs.filter((g) => g.title.toLowerCase().includes(s) || g.provider.toLowerCase().includes(s));
    }
    if (sort === 'rtp') xs = [...xs].sort((a, b) => +b.rtp - +a.rtp);
    if (sort === 'new') xs = [...xs].slice().reverse();
    if (sort === 'az') xs = [...xs].sort((a, b) => a.title.localeCompare(b.title));
    return xs.slice(0, 24);

  return (
    <section className="lobby-section" data-screen-label="Browse all">

  const allMatches = [
  { league: 'Champions League', home: 'Real Madrid', away: 'Bayern', start: 'Today · 20:00', odds: ['1.85', '3.40', '4.20'], live: true, score: '1 - 0', min: '34\'', provider: 'Saba' },

/* ─── GAME MODAL ─────────────────────────────── */
function GameModal({ game, onClose }) {
  useEffect(() => {
    const k = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [onClose]);
  if (!game) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 17 }}>{game.title}</div>
            <span className="gcard-provider" style={{ fontSize: 12 }}>{game.provider}</span>
          </div>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={14} /></button>
        </div>
        <div className="modal-body">
          <div className="game-modal-art" style={{ '--gm-bg': game.bg }}>
            [ {game.title.toUpperCase()} GAMEPLAY PREVIEW ]
          </div>
          <div style={{ color: 'var(--text-mid)', fontSize: 13.5, lineHeight: 1.6 }}>
            {game.title} is a {game.category} game from {game.provider}. Spin volatile reels, stack
            multipliers, and bank wins instantly to your crypto balance. Provably fair on every round.
          </div>
          <div className="game-modal-stats">
            <div className="game-modal-stat">
              <div className="game-modal-stat-label">RTP</div>
              <div className="game-modal-stat-val">{game.rtp}%</div>
            </div>
            <div className="game-modal-stat">
              <div className="game-modal-stat-label">Max win</div>
              <div className="game-modal-stat-val">{game.maxWin}</div>
            </div>
            <div className="game-modal-stat">
              <div className="game-modal-stat-label">Volatility</div>
              <div className="game-modal-stat-val">High</div>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn">Demo</button>
          <button className="btn primary">Play for real →</button>
        </div>
      </div>
    </div>);

}

function StatusPill({ value }) {
  const cls = value === 'Approved' ? 'ok' : value === 'Pending' ? 'pend' : value === 'Rejected' ? 'rej' : '';
