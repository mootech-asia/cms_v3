<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CMS_前台_v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260616a" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="account-pages.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { GAMES, RECENTLY_PLAYED } = window.LOBBY_DATA;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "#2473ff",
  "density": "comfy",
  "aspect": 1.1,
  "showPromos": true,
  "sidebarCollapsed": false
}/*EDITMODE-END*/;

const ACCENT_PALETTES = {
  '#1fd373': { a2: '#29e8a3', a3: '#b6f37c' },
  '#2473ff': { a2: '#38bdf8', a3: '#fbbf24' },
  '#7c5cff': { a2: '#22d3ee', a3: '#fbbf24' },
  '#22d3ee': { a2: '#2473ff', a3: '#fbbf24' },
  '#f472b6': { a2: '#38bdf8', a3: '#fde68a' },
  '#fb923c': { a2: '#f472b6', a3: '#facc15' }
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeTab, setActiveTab] = useState('Casino');
  const [activeCat, setActiveCat] = useState('Lobby');
  const [catTab, setCatTab] = useState('Lobby');
  const [openGame, setOpenGame] = useState(null);
  const [showSignIn, setShowSignIn] = useState(false);
  const [showSupport, setShowSupport] = useState(false);
  const [balance, setBalance] = useState(1284.32);
  const [user, setUser] = useState(null);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);

  // scroll to top when navigating between sections/pages
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [activeCat]);

  // simulate small balance fluctuation
  useEffect(() => {
    const i = setInterval(() => setBalance(b => +(b + (Math.random() * 4 - 1.7)).toFixed(2)), 5500);
    return () => clearInterval(i);
  }, []);

  // apply theme + tweaks to root vars
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    const r = document.documentElement.style;
    r.setProperty('--accent', t.accent);
    const palette = ACCENT_PALETTES[t.accent] || ACCENT_PALETTES['#7c5cff'];
    r.setProperty('--accent-2', palette.a2);
    r.setProperty('--accent-3', palette.a3);
    r.setProperty('--card-aspect', t.aspect);
  }, [t.theme, t.accent, t.aspect]);

  return (
    <div className={`shell ${t.sidebarCollapsed ? 'collapsed' : ''} ${mobileSidebarOpen ? 'mobile-open' : ''}`}>
      <div className="sidebar-backdrop" onClick={() => setMobileSidebarOpen(false)}></div>
      <Sidebar collapsed={t.sidebarCollapsed}
               setCollapsed={(fn) => setTweak('sidebarCollapsed', typeof fn === 'function' ? fn(t.sidebarCollapsed) : fn)}
               activeCat={activeCat} setActiveCat={(c) => { setActiveCat(c); setMobileSidebarOpen(false); }}
               activeTab={activeTab} setActiveTab={setActiveTab}
               user={user} onSignIn={() => setShowSignIn(true)} onSupport={() => setShowSupport(true)} />
      <div className="shell-main">
      <TopBar onSignIn={() => setShowSignIn(true)} balance={balance}
              user={user} onLogout={() => setUser(null)}
              onHome={() => { setActiveCat('Lobby'); setCatTab('Lobby'); }}
              setActiveCat={setActiveCat} />
      <main className="container" style={{paddingBottom: 24}}>
        {activeCat === 'Account Overview' && (
          <AccountOverview user={user} balance={balance} setActiveCat={setActiveCat} />
        )}
        {activeCat === 'DepositForm' && (
          <DepositPage setActiveCat={setActiveCat} />
        )}
        {activeCat === 'WithdrawalForm' && (
          <WithdrawalPage setActiveCat={setActiveCat} user={user} />
        )}
        {['Betting Record','Deposit Record','Profit And Loss','Withdrawal Record','Account Record'].includes(activeCat) && (
          <RecordTable title={activeCat} setActiveCat={setActiveCat} />
        )}
        {activeCat === 'Support' && (
          <SupportPage setActiveCat={setActiveCat} />
        )}
        {activeCat === 'Personal Info' && (
          <PersonalInfo user={user} setActiveCat={setActiveCat} />
        )}
        {activeCat === 'Security Center' && (
          <SecurityCenter setActiveCat={setActiveCat} onLogout={() => setUser(null)} />
        )}
        {activeCat === 'Customer Service' && (
          <CustomerServicePage setActiveCat={setActiveCat} />
        )}
        {(activeCat === 'Lobby' || !['Account Overview','Deposit Record','Withdrawal Record','DepositForm','WithdrawalForm','Support','Betting Record','Profit And Loss','Account Record','Personal Info','Security Center','Customer Service'].includes(activeCat)) && <>
        <Hero />
        {t.showPromos && <PromoRibbon />}
        {user && <RewardsBanner user={user} />}
        {t.showPromos && <Promos active={catTab} setActive={setCatTab} />}
        {catTab === 'Lobby' && <>
          <Rail title="Recently played" games={RECENTLY_PLAYED} onOpen={setOpenGame}
                density={t.density} count={RECENTLY_PLAYED.length} />
          <Rail title="Slots"      icon="fire" games={GAMES.slots}     onOpen={setOpenGame} density={t.density} />
          <Rail title="Live Casino" icon="bolt" games={GAMES.live}      onOpen={setOpenGame} density={t.density} />
        </>}
        {catTab === 'Hot Games' && (
          <CategoryView title="Hot Games" icon="fire"
                games={[...GAMES.slots, ...GAMES.live, ...GAMES.originals]}
                onOpen={setOpenGame} density={t.density} />
        )}
        {catTab === 'Mini Games' && (
          <CategoryView title="Mini Games" icon="star" games={GAMES.originals} onOpen={setOpenGame} density={t.density} />
        )}
        {catTab === 'Slots' && (
          <CategoryView title="Slots" icon="fire" games={GAMES.slots} onOpen={setOpenGame} density={t.density} />
        )}
        {catTab === 'Live' && (
          <CategoryView title="Live" icon="bolt" games={GAMES.live} onOpen={setOpenGame} density={t.density} />
        )}
        {catTab === 'Fish' && (
          <CategoryView title="Fish" games={GAMES.slots} onOpen={setOpenGame} density={t.density} />
        )}
        {catTab === 'Promotion' && (
          <Promotion />
        )}
        {catTab === 'Sports' && (
          <Sports />
        )}
        {catTab !== 'Promotion' && catTab !== 'Sports' && catTab !== 'Hot Games' && catTab !== 'Mini Games' && catTab !== 'Slots' && catTab !== 'Live' && catTab !== 'Fish' && <>
        <FilteredGrid onOpen={setOpenGame} density={t.density} />
        <Tournaments />
        <Promotion />
        </>}
        </>}
      </main>
      <Footer />
      <MobileNav catTab={catTab} setCatTab={setCatTab}
                 onBrowse={() => setMobileSidebarOpen(o => !o)}
                 mobileSidebarOpen={mobileSidebarOpen}
                 setActiveCat={setActiveCat}
                 onCloseSidebar={() => setMobileSidebarOpen(false)} />

      </div>
      {openGame && <GameModal game={openGame} onClose={() => setOpenGame(null)} />}
      {showSignIn && <SignInModal onClose={() => setShowSignIn(false)} onLogin={setUser} />}
      {showSupport && <CustomerServiceModal onClose={() => setShowSupport(false)} />}

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme} options={['dark','light']}
                    onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="Accent" value={t.accent}
                    options={['#1fd373','#2473ff','#22d3ee','#f472b6','#fb923c']}
                    onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Game cards" />
        <TweakRadio label="Density" value={t.density} options={['compact','regular','comfy']}
                    onChange={(v) => setTweak('density', v)} />
        <TweakSlider label="Card ratio" value={t.aspect} min={0.6} max={1.2} step={0.01}
                     onChange={(v) => setTweak('aspect', v)} />

        <TweakSection label="Layout" />
        <TweakToggle label="Show promo strip" value={t.showPromos}
                     onChange={(v) => setTweak('showPromos', v)} />
        <TweakToggle label="Collapse sidebar" value={t.sidebarCollapsed}
                     onChange={(v) => setTweak('sidebarCollapsed', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
